name: Build & Release SafeSkill CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # 支持手动触发

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  #  Windows → safeskill.exe
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller requests pyyaml

      - name: Build .exe
        run: |
          pyinstaller `
            --onefile `
            --name safeskill `
            --hidden-import safeskill.cli `
            --hidden-import safeskill.api `
            --hidden-import safeskill.config `
            --hidden-import safeskill.output `
            --hidden-import yaml `
            --hidden-import requests `
            --clean `
            --noconfirm `
            bin/safeskill

      - name: Rename artifact
        run: mv dist/safeskill.exe dist/safeskill-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: safeskill-windows
          path: dist/safeskill-windows.exe

  # ─────────────────────────────────────────────
  #  macOS → safeskill-macos.dmg
  # ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller requests pyyaml

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name safeskill \
            --hidden-import safeskill.cli \
            --hidden-import safeskill.api \
            --hidden-import safeskill.config \
            --hidden-import safeskill.output \
            --hidden-import yaml \
            --hidden-import requests \
            --clean \
            --noconfirm \
            bin/safeskill

      - name: Package as .dmg
        run: |
          # 创建 dmg 内容目录
          mkdir -p dmg_content
          cp dist/safeskill dmg_content/safeskill
          # 写一个简单 README 放进 dmg
          echo "SafeSkill CLI v1.1.0\n\n将 safeskill 拖动到 /usr/local/bin/ 即可全局使用。\n\n用法: safeskill --help" > dmg_content/使用说明.txt
          # 打包为 dmg
          hdiutil create \
            -volname "SafeSkill CLI" \
            -srcfolder dmg_content \
            -ov -format UDZO \
            dist/safeskill-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: safeskill-macos
          path: dist/safeskill-macos.dmg

  # ─────────────────────────────────────────────
  #  Linux → safeskill-linux (x86_64)
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04   # 旧版系统，glibc 兼容性更好
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller requests pyyaml

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name safeskill \
            --hidden-import safeskill.cli \
            --hidden-import safeskill.api \
            --hidden-import safeskill.config \
            --hidden-import safeskill.output \
            --hidden-import yaml \
            --hidden-import requests \
            --strip \
            --clean \
            --noconfirm \
            bin/safeskill
          chmod +x dist/safeskill
          mv dist/safeskill dist/safeskill-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: safeskill-linux
          path: dist/safeskill-linux

  # ─────────────────────────────────────────────
  #  发布 Release（仅 tag 触发时）
  # ─────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SafeSkill CLI ${{ github.ref_name }}"
          body: |
            ## SafeSkill CLI ${{ github.ref_name }}

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `safeskill-windows.exe` | 双击或命令行直接运行 |
            | macOS | `safeskill-macos.dmg` | 挂载后将二进制拖入 `/usr/local/bin` |
            | Linux | `safeskill-linux` | `chmod +x` 后运行 |

            ### 快速开始
            ```bash
            # macOS / Linux
            chmod +x safeskill-linux
            ./safeskill-linux --help

            # Windows
            safeskill-windows.exe --help
            ```
          files: |
            safeskill-windows/safeskill-windows.exe
            safeskill-macos/safeskill-macos.dmg
            safeskill-linux/safeskill-linux
