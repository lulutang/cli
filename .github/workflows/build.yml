name: Build & Release SafeSkill CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  #  Windows → safeskill-windows.exe
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller requests pyyaml

      - name: Build .exe
        run: |
          pyinstaller `
            --onefile `
            --name safeskill `
            --hidden-import safeskill.cli `
            --hidden-import safeskill.api `
            --hidden-import safeskill.config `
            --hidden-import safeskill.output `
            --hidden-import yaml `
            --hidden-import requests `
            --clean `
            --noconfirm `
            bin/safeskill

      - name: Rename artifact
        run: mv dist/safeskill.exe dist/safeskill-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: safeskill-windows
          path: dist/safeskill-windows.exe

  # ─────────────────────────────────────────────
  #  macOS → safeskill-macos.dmg
  # ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller requests pyyaml

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name safeskill \
            --hidden-import safeskill.cli \
            --hidden-import safeskill.api \
            --hidden-import safeskill.config \
            --hidden-import safeskill.output \
            --hidden-import yaml \
            --hidden-import requests \
            --clean \
            --noconfirm \
            bin/safeskill

      - name: Package as .dmg
        run: |
          mkdir -p dmg_content
          cp dist/safeskill dmg_content/safeskill
          printf "SafeSkill CLI v1.1.0\n\n将 safeskill 拖动到 /usr/local/bin/ 即可全局使用。\n\n用法: safeskill --help" > dmg_content/使用说明.txt
          hdiutil create \
            -volname "SafeSkill CLI" \
            -srcfolder dmg_content \
            -ov -format UDZO \
            dist/safeskill-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: safeskill-macos
          path: dist/safeskill-macos.dmg

  # ─────────────────────────────────────────────
  #  Linux → safeskill-linux
  #  CentOS 7 容器 + 阿里云镜像源，glibc 2.17
  #  与目标服务器环境完全一致
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build inside CentOS 7 container (aliyun mirror)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            centos:7 \
            bash -c "
              set -e

              # 替换为阿里云镜像源（官方源已下线）
              sed -i 's|mirrorlist=|#mirrorlist=|g' /etc/yum.repos.d/CentOS-Base.repo
              sed -i 's|#baseurl=http://mirror.centos.org|baseurl=https://mirrors.aliyun.com|g' /etc/yum.repos.d/CentOS-Base.repo

              # 安装编译依赖
              yum install -y gcc make zlib-devel bzip2-devel openssl-devel \
                libffi-devel wget xz

              # 编译安装 Python 3.11
              cd /tmp
              wget -q https://www.python.org/ftp/python/3.11.9/Python-3.11.9.tar.xz
              tar xf Python-3.11.9.tar.xz
              cd Python-3.11.9
              ./configure --with-ensurepip=install
              make -j\$(nproc)
              make altinstall
              python3.11 -m pip install --upgrade pip -q

              # 回到工作目录安装依赖并打包
              cd /workspace
              python3.11 -m pip install pyinstaller requests pyyaml -q
              python3.11 -m PyInstaller \
                --onefile \
                --name safeskill \
                --hidden-import safeskill.cli \
                --hidden-import safeskill.api \
                --hidden-import safeskill.config \
                --hidden-import safeskill.output \
                --hidden-import yaml \
                --hidden-import requests \
                --strip \
                --clean \
                --noconfirm \
                bin/safeskill
              chmod +x dist/safeskill
              mv dist/safeskill dist/safeskill-linux
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: safeskill-linux
          path: dist/safeskill-linux

  # ─────────────────────────────────────────────
  #  发布 Release（仅 tag 触发时）
  # ─────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SafeSkill CLI ${{ github.ref_name }}"
          body: |
            ## SafeSkill CLI ${{ github.ref_name }}

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `safeskill-windows.exe` | 直接运行，无需安装 |
            | macOS   | `safeskill-macos.dmg`   | 挂载后拷贝到 `/usr/local/bin` |
            | Linux   | `safeskill-linux`       | `chmod +x` 后运行，兼容 glibc 2.17（CentOS 7+） |
          files: |
            safeskill-windows/safeskill-windows.exe
            safeskill-macos/safeskill-macos.dmg
            safeskill-linux/safeskill-linux