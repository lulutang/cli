name: Build & Release SafeSkill CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  #  Windows → safeskill-windows.exe
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller requests pyyaml

      - name: Build .exe
        run: |
          pyinstaller `
            --onefile `
            --name safeskill `
            --hidden-import safeskill.cli `
            --hidden-import safeskill.api `
            --hidden-import safeskill.config `
            --hidden-import safeskill.output `
            --hidden-import yaml `
            --hidden-import requests `
            --clean `
            --noconfirm `
            bin/safeskill

      - name: Rename artifact
        run: mv dist/safeskill.exe dist/safeskill-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: safeskill-windows
          path: dist/safeskill-windows.exe

  # ─────────────────────────────────────────────
  #  macOS → safeskill-macos.dmg
  # ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller requests pyyaml

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name safeskill \
            --hidden-import safeskill.cli \
            --hidden-import safeskill.api \
            --hidden-import safeskill.config \
            --hidden-import safeskill.output \
            --hidden-import yaml \
            --hidden-import requests \
            --clean \
            --noconfirm \
            bin/safeskill

      - name: Package as .dmg
        run: |
          mkdir -p dmg_content
          cp dist/safeskill dmg_content/safeskill
          echo "SafeSkill CLI v1.1.0\n\n将 safeskill 拖动到 /usr/local/bin/ 即可全局使用。\n\n用法: safeskill --help" > dmg_content/使用说明.txt
          hdiutil create \
            -volname "SafeSkill CLI" \
            -srcfolder dmg_content \
            -ov -format UDZO \
            dist/safeskill-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: safeskill-macos
          path: dist/safeskill-macos.dmg

  # ─────────────────────────────────────────────
  #  Linux → safeskill-linux
  #  使用 manylinux2014 镜像，glibc 2.17，兼容低版本服务器
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          /opt/python/cp311-cp311/bin/pip install pyinstaller requests pyyaml

      - name: Build binary
        run: |
          /opt/python/cp311-cp311/bin/pyinstaller \
            --onefile \
            --name safeskill \
            --hidden-import safeskill.cli \
            --hidden-import safeskill.api \
            --hidden-import safeskill.config \
            --hidden-import safeskill.output \
            --hidden-import yaml \
            --hidden-import requests \
            --strip \
            --clean \
            --noconfirm \
            bin/safeskill
          chmod +x dist/safeskill
          mv dist/safeskill dist/safeskill-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: safeskill-linux
          path: dist/safeskill-linux

  # ─────────────────────────────────────────────
  #  发布 Release（仅 tag 触发时）
  # ─────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SafeSkill CLI ${{ github.ref_name }}"
          body: |
            ## SafeSkill CLI ${{ github.ref_name }}

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `safeskill-windows.exe` | 直接运行，无需安装 |
            | macOS   | `safeskill-macos.dmg`   | 挂载后拷贝到 `/usr/local/bin` |
            | Linux   | `safeskill-linux`       | `chmod +x` 后运行，兼容 glibc 2.17+ |
          files: |
            safeskill-windows/safeskill-windows.exe
            safeskill-macos/safeskill-macos.dmg
            safeskill-linux/safeskill-linux